syntax = "proto3";

package redpanda.datalake;

// Date is a Redpanda well-known type representing a calendar date. It makes
// it possible to represent dates without times or time zones, which is useful
// for datalake integrations like Iceberg that support date types.
message Date {
    // The date as a number of days since the Unix epoch (1970-01-01). Negative
    // values represent dates before the epoch.
    int32 date = 1;
}
