syntax = "proto3";

package redpanda.core.admin.v2;

import "proto/redpanda/core/pbgen/options.proto";
import "proto/redpanda/core/pbgen/rpc.proto";
import "proto/redpanda/core/common/v1/acl.proto";
import "proto/redpanda/core/common/v1/tls.proto";
import "google/api/field_behavior.proto";
import "google/api/field_info.proto";
import "google/api/resource.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";

option (pbgen.cpp_namespace) = "proto::admin";

service ShadowLinkService {
    // CreateShadowLink
    //
    // Creates a new shadow link between clusters.
    rpc CreateShadowLink(CreateShadowLinkRequest)
        returns (CreateShadowLinkResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }
    // DeleteShadowLink
    //
    // Deletes an existing shadow link.
    rpc DeleteShadowLink(DeleteShadowLinkRequest)
        returns (DeleteShadowLinkResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }
    // GetShadowLink
    //
    // Gets information about a specific shadow link.
    rpc GetShadowLink(GetShadowLinkRequest) returns (GetShadowLinkResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }
    // ListShadowLinks
    //
    // Lists all shadow links in the cluster.
    rpc ListShadowLinks(ListShadowLinksRequest)
        returns (ListShadowLinksResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }
    // UpdateShadowLink
    //
    // Updates an existing shadow link configuration.
    rpc UpdateShadowLink(UpdateShadowLinkRequest)
        returns (UpdateShadowLinkResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }
    // FailOver
    //
    // Fails over a shadow link or a single shadow topic for disaster recovery.
    rpc FailOver(FailOverRequest) returns (FailOverResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }

    // GetShadowTopic
    //
    // Returns information about a shadow topic on a shadow link.
    // A shadow topic is a resource created automatically by a shadow link. The
    // shadow topic 'shadows' a topic on a source cluster, mirroring the data
    // and properties of that topic.
    rpc GetShadowTopic(GetShadowTopicRequest) returns (GetShadowTopicResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }
    // ListShadowTopics
    //
    // Returns a list of all shadow topics on a shadow link and
    // their status.
    rpc ListShadowTopics(ListShadowTopicsRequest)
        returns (ListShadowTopicsResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }
}

/* Resources */
// A ShadowLink resource
message ShadowLink {
    // The name of the shadow link
    string name = 1 [(google.api.field_behavior) = REQUIRED];
    // The UUID of the shadow link
    string uid = 2 [
        (google.api.field_behavior) = OUTPUT_ONLY,
        (google.api.field_info).format = UUID4
    ];
    // Shadow link configuration
    ShadowLinkConfigurations configurations = 3;
    // Status of the shadow link
    ShadowLinkStatus status = 4 [(google.api.field_behavior) = OUTPUT_ONLY];
}

// A ShadowTopic resource contained by the ShadowLink
message ShadowTopic {
    // Name of the shadow topic
    string name = 1 [(google.api.field_behavior) = OUTPUT_ONLY];
    // The topic ID of the shadow topic
    string topic_id = 2 [
        (google.api.field_behavior) = OUTPUT_ONLY,
        (google.api.field_info).format = UUID4
    ];
    // The name of the source topic
    string source_topic_name = 3;
    // The topic ID of the source topic
    string source_topic_id = 4 [
        (google.api.field_behavior) = OUTPUT_ONLY,
        (google.api.field_info).format = UUID4
    ];
    // The status of the shadow topic
    ShadowTopicStatus status = 5 [(google.api.field_behavior) = OUTPUT_ONLY];
}

/* RPC Requests and Responses */
// Create a new shadow link
message CreateShadowLinkRequest {
    // The shadow link to create
    ShadowLink shadow_link = 1;
}
// Response to creating a shadow link
message CreateShadowLinkResponse {
    // The shadow link that was created
    ShadowLink shadow_link = 1;
}
// Request to delete a shadow link
message DeleteShadowLinkRequest {
    // The name of the link to delete
    string name = 1 [
        (google.api.field_behavior) = REQUIRED,
        (google.api.resource_reference) = {
            type: "redpanda.core.admin.ShadowLinkService/ShadowLink"
        }
    ];
    // By default, DeleteShadowLink will fail if there are any active Shadow
    // Topics.  Set this flag to 'true' if you wish to delete the link while
    // there are active shadow topics.
    bool force = 2;
}
// Response to deleting a shadow link
message DeleteShadowLinkResponse {}
// Request to get the information about a shadow link
message GetShadowLinkRequest {
    // The name of the shadow link to get
    string name = 1 [
        (google.api.field_behavior) = REQUIRED,
        (google.api.resource_reference) = {
            type: "redpanda.core.admin.ShadowLinkService/ShadowLink"
        }
    ];
}
// Response to getting a shadow link
message GetShadowLinkResponse {
    // The shadow link that was retrieved
    ShadowLink shadow_link = 1;
}
// Request to list all shadow links
message ListShadowLinksRequest {}
// All shadow links on the cluster
message ListShadowLinksResponse {
    // The shadow links
    repeated ShadowLink shadow_links = 1;
}
// Updates a shadow link
message UpdateShadowLinkRequest {
    // The shadow link to update
    ShadowLink shadow_link = 1;

    // The list of fields to update
    // See [AIP-134](https://google.aip.dev/134) for how to use `field_mask`
    google.protobuf.FieldMask update_mask = 2;
}
// Response to the update shadow link request
message UpdateShadowLinkResponse {
    // The shadow link that was updated
    ShadowLink shadow_link = 1;
}
// Request to fail over a shadow link or a single shadow topic
message FailOverRequest {
    // The name of the shadow link to fail over
    string name = 1 [
        (google.api.field_behavior) = REQUIRED,
        (google.api.resource_reference) = {
            type: "redpanda.core.admin.ShadowLinkService/ShadowLink"
        }
    ];
    // The name of the shadow topic to fail over, if not set will fail over
    // the entire shadow link
    string shadow_topic_name = 2 [(google.api.field_behavior) = OPTIONAL];
}
// The response to the FailOverRequest
message FailOverResponse {
    // The shadow link that was failed over
    ShadowLink shadow_link = 1;
}
// Request to get a shadow topic
message GetShadowTopicRequest {
    // The name of the shadow link the topic is contained in
    string shadow_link_name = 1 [(google.api.field_behavior) = REQUIRED];
    // The name of the shadow topic to get
    string name = 2 [(google.api.field_behavior) = REQUIRED];
}
// Response of to getting a shadow topic
message GetShadowTopicResponse {
    ShadowTopic shadow_topic = 1;
}
// Request to list all shadow topics in a shadow link
message ListShadowTopicsRequest {
    string shadow_link_name = 1 [(google.api.field_behavior) = REQUIRED];
}
// Response to listing all shadow topics in a shadow link
message ListShadowTopicsResponse {
    repeated ShadowTopic shadow_topics = 1;
}

/* Other Messages */
// ShadowLink options
message ShadowLinkConfigurations {
    // Configuration for the internal kafka client
    ShadowLinkClientOptions client_options = 1;
    // Topic metadata sync options
    TopicMetadataSyncOptions topic_metadata_sync_options = 2;
    // Consumer offset sync options
    ConsumerOffsetSyncOptions consumer_offset_sync_options = 3;
    // Security settings sync options
    SecuritySettingsSyncOptions security_sync_options = 4;
    // Schema Registry sync options
    SchemaRegistrySyncOptions schema_registry_sync_options = 5;
}
// Options for the client link
message ShadowLinkClientOptions {
    // The bootstrap servers to use
    repeated string bootstrap_servers = 1
        [(google.api.field_behavior) = REQUIRED];
    // The Client ID for the Kafka RPC requests setn by this cluster to the
    // source cluster
    string client_id = 2 [(google.api.field_behavior) = OUTPUT_ONLY];
    // If provided, this is the expected ID of the source cluster.  If it does
    // not match then the connection will be rejected.  If provided, this value
    // must match the `ClusterId` field returned in the Kafka Metadata response
    // message
    string source_cluster_id = 3;
    // TLS settings
    optional common.v1.TLSSettings tls_settings = 4;
    // Authentication settings
    optional AuthenticationConfiguration authentication_configuration = 5;
    // Max metadata age.
    // If 0 is provided, defaults to 10 seconds
    int32 metadata_max_age_ms = 6;
    // The effective metadata max age in milliseconds
    int32 effective_metadata_max_age_ms = 7
        [(google.api.field_behavior) = OUTPUT_ONLY];
    // Connection timeout.
    // If 0 is provided, defaults to 1 second
    int32 connection_timeout_ms = 8;
    // The effective connection timeout in milliseconds
    int32 effective_connection_timeout_ms = 9
        [(google.api.field_behavior) = OUTPUT_ONLY];
    // Retry base backoff.
    // If 0 is provided, defaults to 100ms
    int32 retry_backoff_ms = 10;
    // The effective retry backoff in milliseconds
    int32 effective_retry_backoff_ms = 11
        [(google.api.field_behavior) = OUTPUT_ONLY];
    // Fetch request timeout.
    // If 0 is provided, defaults to 500ms
    int32 fetch_wait_max_ms = 12;
    // The effective fetch wait max in milliseconds
    int32 effective_fetch_wait_max_ms = 13
        [(google.api.field_behavior) = OUTPUT_ONLY];
    // Fetch min bytes.
    // If 0 is provided, defaults to 5 MiB
    int32 fetch_min_bytes = 14;
    // The effective fetch min bytes
    int32 effective_fetch_min_bytes = 15
        [(google.api.field_behavior) = OUTPUT_ONLY];
    // Fetch max bytes.
    // If 0 is provided, defaults to 20 MiB
    int32 fetch_max_bytes = 16;
    // The effective fetch max bytes
    int32 effective_fetch_max_bytes = 17
        [(google.api.field_behavior) = OUTPUT_ONLY];
    // Fetch partition max bytes.
    // If 0 is provided, defaults to 5 MiB
    int32 fetch_partition_max_bytes = 18;
    // The effective fetch partition max bytes
    int32 effective_fetch_partition_max_bytes = 19
        [(google.api.field_behavior) = OUTPUT_ONLY];
}
// Options for syncing topic metadata
message TopicMetadataSyncOptions {
    // How often to sync metadata
    // If 0 provided, defaults to 30 seconds
    google.protobuf.Duration interval = 1;
    // The effective interval for the task
    google.protobuf.Duration effective_interval = 2
        [(google.api.field_behavior) = OUTPUT_ONLY];
    // List of filters that indicate which topics should be automatically
    // created as shadow topics on the shadow cluster.  This only controls
    // automatic creation of shadow topics and does not effect the state of the
    // mirror topic once it is created.
    // Literal filters for __consumer_offsets, _redpanda.audit_log and _schemas
    // will be rejected as well as prefix filters to match topics prefixed with
    // _redpanda or __redpanda.
    // Wildcard `*` is permitted only for literal filters and will _not_ match
    // any topics that start with _redpanda or __redpanda.  If users wish to
    // shadow topics that start with _redpanda or __redpanda, they should
    // provide a literal filter for those topics.
    repeated NameFilter auto_create_shadow_topic_filters = 3;
    // List of topic properties that should be synced from the source topic.
    // The following properties will always be replicated
    // - Partition count
    // - `max.message.bytes`
    // - `cleanup.policy`
    // - `timestamp.type`
    //
    // The following properties are not allowed to be replicated and adding them
    // to this list will result in an error:
    // - `redpanda.remote.readreplica`
    // - `redpanda.remote.recovery`
    // - `redpanda.remote.allowgaps`
    // - `redpanda.virtual.cluster.id`
    // - `redpanda.leaders.preference`
    // - `redpanda.storage.mode`
    //
    // This list is a list of properties in addition to the default properties
    // that will be synced.  See `exclude_default`.
    repeated string synced_shadow_topic_properties = 4;
    // If false, then the following topic properties will be synced by default:
    // - `compression.type`
    // - `retention.bytes`
    // - `retention.ms`
    // - `delete.retention.ms`
    // - Replication Factor
    // - `min.compaction.lag.ms`
    // - `max.compaction.lag.ms`
    //
    // If this is true, then only the properties listed in
    // `synced_shadow_topic_properties` will be synced.
    bool exclude_default = 5;
    // Start at the earliest offset in the partition.
    message EarliestOffset {}
    // Start at the latest offset in the partition.
    message LatestOffset {}
    // The starting offset for new shadow topic partitions.
    // Defaults to earliest.
    // Only applies if the shadow partition is empty.
    oneof start_offset {
        // Enables data replication from the earliest offset
        // on the source topic/partition.
        EarliestOffset start_at_earliest = 6;
        // Enables data replication from the latest offset
        // on the source topic/partition.
        LatestOffset start_at_latest = 7;
        // Enables data replication from the first offset on the
        // source topic/partition where the record's timestamp is
        // at or after the specified timestamp.
        google.protobuf.Timestamp start_at_timestamp = 8;
    }
    // Allows user to pause the topic sync task.  If paused, then
    // the task will enter the 'paused' state and not sync topics or their
    // properties from the source cluster
    bool paused = 9;
}
// Options for how the Schema Registry is synced.
message SchemaRegistrySyncOptions {
    // Shadow the entire source cluster's Schema Registry byte-for-byte.
    // If set, the Shadow Link will attempt to add the `_schemas`
    // topic to the list of Shadow Topics as long as:
    // 1. The `_schemas` topic exists on the source cluster
    // 2. The `_schemas` topic does not exist on the shadow cluster, or it is
    // empty.
    // If either of the above conditions are _not_ met, then the `_schemas`
    // topic will _not_ be shadowed by this cluster. Unsetting this flag will
    // _not_ remove the `_schemas` topic from shadowing if it has already been
    // added.  Once made a shadow topic, the
    // `_schemas` topic will be replicated byte-for-byte.  To stop shadowing the
    // `_schemas` topic, unset this field, then either fail-over the topic or
    // delete it.
    message ShadowSchemaRegistryTopic {}
    // Schema Registry shadowing mode.
    oneof schema_registry_shadowing_mode {
        ShadowSchemaRegistryTopic shadow_schema_registry_topic = 1;
    }
}
// Options for syncing consumer offsets
message ConsumerOffsetSyncOptions {
    // Sync interval
    // If 0 provided, defaults to 30 seconds
    google.protobuf.Duration interval = 1;
    // The effective interval for the task
    google.protobuf.Duration effective_interval = 2
        [(google.api.field_behavior) = OUTPUT_ONLY];
    // Allows user to pause the consumer offset sync task.  If paused, then
    // the task will enter the 'paused' state and not sync consumer offsets from
    // the source cluster
    bool paused = 3;
    // The filters
    repeated NameFilter group_filters = 4;
}
// Options for syncing security settings
message SecuritySettingsSyncOptions {
    // Sync interval
    // If 0 provided, defaults to 30 seconds
    google.protobuf.Duration interval = 1;
    // The effective interval for the task
    google.protobuf.Duration effective_interval = 2
        [(google.api.field_behavior) = OUTPUT_ONLY];
    // Allows user to pause the security settings sync task.  If paused,
    // then the task will enter the 'paused' state and will not sync security
    // settings from the source cluster
    bool paused = 3;
    // ACL filters
    repeated ACLFilter acl_filters = 4;
}
// Authentication config.  Supports:
// * SASL/SCRAM
// * SASL/PLAIN
message AuthenticationConfiguration {
    oneof authentication {
        // SASL/SCRAM configuration
        ScramConfig scram_configuration = 1;
        // SASL/PLAIN configuration
        PlainConfig plain_configuration = 2;
    }
}
// PLAIN settings
message PlainConfig {
    // PLAIN username
    string username = 1;
    // Password
    string password = 2
        [(google.api.field_behavior) = INPUT_ONLY, debug_redact = true];
    // Indicates that the password has been set
    bool password_set = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
    // Timestamp of when the password was last set - only valid if password_set
    // is true
    google.protobuf.Timestamp password_set_at = 4
        [(google.api.field_behavior) = OUTPUT_ONLY];
}
// SCRAM settings
message ScramConfig {
    // SCRAM username
    string username = 1;
    // Password
    string password = 2
        [(google.api.field_behavior) = INPUT_ONLY, debug_redact = true];
    // Indicates that the password has been set
    bool password_set = 3 [(google.api.field_behavior) = OUTPUT_ONLY];
    // Timestamp of when the password was last set - only valid if password_set
    // is true
    google.protobuf.Timestamp password_set_at = 4
        [(google.api.field_behavior) = OUTPUT_ONLY];
    // The SCRAM mechanism to use
    ScramMechanism scram_mechanism = 5;
}
// A filter based on the name of a resource
message NameFilter {
    // Literal or prefix
    PatternType pattern_type = 1;
    // Include or exclude
    FilterType filter_type = 2;
    // The resource name, or "*"
    // Note if "*", must be the _only_ character
    // and `pattern_type` must be `PATTERN_TYPE_LITERAL`
    string name = 3;
}
// A filter for ACLs
message ACLFilter {
    // The resource filter
    ACLResourceFilter resource_filter = 1;
    // The access filter
    ACLAccessFilter access_filter = 2;
}
// A filter to match ACLs for resources
message ACLResourceFilter {
    // The ACL resource type to match
    common.v1.ACLResource resource_type = 1;
    // The pattern to apply to name
    common.v1.ACLPattern pattern_type = 2;
    // Name, if not given will default to match all items in `resource_type`.
    // Note that asterisk `*` is literal and matches resource ACLs
    // that are named `*`
    string name = 3;
}
// Filter an ACL based on its access
message ACLAccessFilter {
    // The name of the principal, if not set will default to match
    // all principals with the specified `operation` and `permission_type`
    string principal = 1;
    // The ACL operation to match
    common.v1.ACLOperation operation = 2;
    // The permission type
    common.v1.ACLPermissionType permission_type = 3;
    // The host to match.  If not set, will default to match all hosts
    // with the specified `operation` and `permission_type`. Note that
    // the asterisk `*` is literal and matches hosts that are set to `*`
    string host = 4;
}
// Status of the shadow link
message ShadowLinkStatus {
    ShadowLinkState state = 1;
    // Statuses of the running tasks
    repeated ShadowLinkTaskStatus task_statuses = 2;
    // Status of shadow topics
    repeated ShadowTopic shadow_topics = 3;
    // List of topic properties that are being synced
    repeated string synced_shadow_topic_properties = 4;
}
// Status of a task
message ShadowLinkTaskStatus {
    // Name of the task
    string name = 1;
    // State of the task
    TaskState state = 2;
    // Reason for task being in state
    string reason = 3;
    // The broker the task is running on
    int32 broker_id = 4;
    // The shard the task is running on
    int32 shard = 5;
}
// Status of a ShadowTopic
message ShadowTopicStatus {
    // State of the shadow topic
    ShadowTopicState state = 1;
    // List of partition information for the shadow topic
    repeated TopicPartitionInformation partition_information = 2;
}
// Topic partition information
message TopicPartitionInformation {
    // Partition ID
    int64 partition_id = 1;
    // Source partition's LSO
    int64 source_last_stable_offset = 2;
    // Source partition's HWM
    int64 source_high_watermark = 3;
    // Shadowed partition's HWM
    int64 high_watermark = 4;
    // Timestamp of the last time the source partition information was updated
    google.protobuf.Timestamp source_last_updated_timestamp = 5;
}

/* Enums */
// State of the shadow link
enum ShadowLinkState {
    // Unspecified
    SHADOW_LINK_STATE_UNSPECIFIED = 0;
    // Shadow link is active
    SHADOW_LINK_STATE_ACTIVE = 1;
    // Shadow link was paused
    SHADOW_LINK_STATE_PAUSED = 2;
}
// Valid SCRAM mechanisms
enum ScramMechanism {
    SCRAM_MECHANISM_UNSPECIFIED = 0;
    // SCRAM-SHA-256
    SCRAM_MECHANISM_SCRAM_SHA_256 = 1;
    // SCRAM-SHA-512
    SCRAM_MECHANISM_SCRAM_SHA_512 = 2;
}
// The matching pattern type
enum PatternType {
    option allow_alias = true;
    PATTERN_TYPE_UNSPECIFIED = 0;
    // Must match the filter exactly
    PATTERN_TYPE_LITERAL = 1;
    // Will match anything that starts with filter
    PATTERN_TYPE_PREFIX = 2;
    // Will match anything that starts with filter
    PATTERN_TYPE_PREFIXED = 2;
}
// What type of filter this is, include or exclude
enum FilterType {
    FILTER_TYPE_UNSPECIFIED = 0;
    // Include the items that match the filter
    FILTER_TYPE_INCLUDE = 1;
    // Exclude the items that match the filter
    FILTER_TYPE_EXCLUDE = 2;
}

// Task states
enum TaskState {
    TASK_STATE_UNSPECIFIED = 0;
    // Task is active
    TASK_STATE_ACTIVE = 1;
    // Task was paused
    TASK_STATE_PAUSED = 2;
    // Task is unable to communicate with source cluster
    TASK_STATE_LINK_UNAVAILABLE = 3;
    // Task is not running
    TASK_STATE_NOT_RUNNING = 4;
    // Task is faulted
    TASK_STATE_FAULTED = 5;
}
// State of a shadow topic
enum ShadowTopicState {
    SHADOW_TOPIC_STATE_UNSPECIFIED = 0;
    // Shadow topic is active
    SHADOW_TOPIC_STATE_ACTIVE = 1;
    // Shadow topic has faulted
    SHADOW_TOPIC_STATE_FAULTED = 2;
    // Shadow topic has been paused
    SHADOW_TOPIC_STATE_PAUSED = 3;
    // Shadow topic is in the process of failing over
    SHADOW_TOPIC_STATE_FAILING_OVER = 4;
    // Shadow topic has failed over successfully
    SHADOW_TOPIC_STATE_FAILED_OVER = 5;
    // Shadow topic is in the process of being promoted
    SHADOW_TOPIC_STATE_PROMOTING = 6;
    // Shadow topic is promoted successfully
    SHADOW_TOPIC_STATE_PROMOTED = 7;
}
