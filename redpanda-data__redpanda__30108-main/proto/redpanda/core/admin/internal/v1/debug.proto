syntax = "proto3";

package redpanda.core.admin.v2.internal;

import "proto/redpanda/core/pbgen/options.proto";
import "proto/redpanda/core/pbgen/rpc.proto";

option (pbgen.cpp_namespace) = "proto::admin";

message StartStressFiberRequest {
    int32 min_spins_per_scheduling_point = 1;
    int32 max_spins_per_scheduling_point = 2;
    int32 stack_depth = 3;
    int32 min_ms_per_scheduling_point = 4;
    int32 max_ms_per_scheduling_point = 5;
    int32 fiber_count = 6;
}

message StartStressFiberResponse {}

message StopStressFiberRequest {}

message StopStressFiberResponse {}

message ThrowStructuredExceptionRequest {
    int32 node_id = 1;
    string reason = 2;
    map<string, string> metadata = 3;
}
message ThrowStructuredExceptionResponse {}

enum LogLevel {
    LOG_LEVEL_UNSPECIFIED = 0;
    LOG_LEVEL_TRACE = 1;
    LOG_LEVEL_DEBUG = 2;
    LOG_LEVEL_INFO = 3;
    LOG_LEVEL_WARN = 4;
    LOG_LEVEL_ERROR = 5;
}

message LogMessageRequest {
    string message = 1;
    LogLevel level = 2;
}

message LogMessageResponse {}

// The DebugService provides access to internal debugging information and debug
// operations for the cluster or node.
//
// NOTE: if you're adding a larger group of RPCs here, please consider splitting
// it out into another service.
service DebugService {
    // This RPC throws a structured exception with the given reason and
    // metadata, it should be accessible as an exception in the RPC protocol.
    //
    // This is used to test the RPC framework itself.
    rpc ThrowStructuredException(ThrowStructuredExceptionRequest)
        returns (ThrowStructuredExceptionResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER,
        };
    }
    rpc StartStressFiber(StartStressFiberRequest)
        returns (StartStressFiberResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER,
        };
    }
    rpc StopStressFiber(StopStressFiberRequest)
        returns (StopStressFiberResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER,
        };
    }
    rpc LogMessage(LogMessageRequest) returns (LogMessageResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER,
        };
    }
}
