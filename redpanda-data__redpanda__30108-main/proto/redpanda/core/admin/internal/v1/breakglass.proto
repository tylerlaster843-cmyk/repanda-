syntax = "proto3";

package redpanda.core.admin.internal.v1;

import "proto/redpanda/core/pbgen/options.proto";
import "proto/redpanda/core/pbgen/rpc.proto";

option (redpanda.core.pbgen.cpp_namespace) = "proto::admin::internal";

// BreakglassService contains expert (internal) only apis to be used in
// extraordinary circumstances.
//
service BreakglassService {
    // Forcibly recovers a cluster's controller when the majority of nodes
    // are lost.
    //
    // This RPC will remove dead nodes from raft0 until a new controller
    // leader is elected, at which point the cluster may be recovered
    // with existing rpcs (nodewise-recovery, decommission brokers).
    //
    // Requirements:
    // 1. All surviving brokers must be booted into recovery mode.
    // 2. There must be no reigning controller leader.
    // 3. This RPC must be invoked on all surviving brokers.
    //
    // A given broker may only accept one controller forced reconfiguration
    // at a time, subsequent invocations will fail.
    //
    // A controller forced reconfiguration may be cancelled and retried
    // by rebooting all brokers.
    //
    rpc ControllerForcedReconfiguration(ControllerForcedReconfigurationRequest)
        returns (ControllerForcedReconfigurationResponse) {
        option (redpanda.core.pbgen.rpc) = {
            authz: SUPERUSER,
        };
    }
}

message ControllerForcedReconfigurationRequest {
    // node ids of lost brokers to be forcibly removed.
    repeated int32 dead_node_ids = 1;
    // the number of surviving nodes remaining.
    uint32 surviving_node_count = 2;
}

message ControllerForcedReconfigurationResponse {}
