syntax = "proto3";

package redpanda.core.admin.internal.datalake.v1;

import "proto/redpanda/core/pbgen/options.proto";
import "proto/redpanda/core/pbgen/rpc.proto";

option (pbgen.cpp_namespace) = "proto::admin";

// The Datalake subsystem manages everything related to Iceberg Topics that is
// Iceberg-agnostic (e.g. offset tracking, pending parquet files).
service DatalakeService {
    // The coordinator is a system topic that manages data that has yet to be
    // committed to Iceberg. Gets the coordinator state for the given topics.
    rpc GetCoordinatorState(GetCoordinatorStateRequest)
        returns (GetCoordinatorStateResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }

    // Probes the iceberg catalog for connectivity and credential validity.
    // Returns an empty response on success or an error with diagnostics.
    rpc DescribeCatalog(DescribeCatalogRequest)
        returns (DescribeCatalogResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }

    rpc CoordinatorResetTopicState(CoordinatorResetTopicStateRequest)
        returns (CoordinatorResetTopicStateResponse) {
        option (pbgen.rpc) = {
            authz: SUPERUSER
        };
    }
}

message GetCoordinatorStateRequest {
    // Names of topics whose state to return. If empty, returns state for all
    // topics.
    repeated string topics_filter = 1;
}

message GetCoordinatorStateResponse {
    CoordinatorState state = 1;
}

message PartitionStateOverride {
    // Overrides last_committed for the partition. If not set, last_committed is
    // not modified.
    optional int64 last_committed = 1;
}

// When reset_all_partitions is true, clears all per partition state
// (pending entries, last_committed, etc), then applies overrides.
// When false, clears pending entries only for partitions in partition_overrides
// and applies optional overrides. No-op if reset_all_partitions is false and
// partition_overrides is empty.
message CoordinatorResetTopicStateRequest {
    string topic_name = 1;
    int64 revision = 2;
    bool reset_all_partitions = 3;
    map<int32, PartitionStateOverride> partition_overrides = 4;
}

message CoordinatorResetTopicStateResponse {}

message CoordinatorState {
    map<string, TopicState> topic_states = 1;
}

message DataFile {
    string remote_path = 1;
    uint64 row_count = 2;
    uint64 file_size_bytes = 3;
    int32 table_schema_id = 4;
    int32 partition_spec_id = 5;
    repeated bytes partition_key = 6;
}

message TranslatedOffsetRange {
    int64 start_offset = 1;
    int64 last_offset = 2;
    repeated DataFile data_files = 3;
    repeated DataFile dlq_files = 4;
    uint64 kafka_processed_bytes = 5;
}

message PendingEntry {
    TranslatedOffsetRange data = 1;
    int64 added_pending_at = 2;
}

message PartitionState {
    repeated PendingEntry pending_entries = 1;
    optional int64 last_committed = 2;
}

enum LifecycleState {
    LIFECYCLE_STATE_UNSPECIFIED = 0;
    LIFECYCLE_STATE_LIVE = 1;
    LIFECYCLE_STATE_CLOSED = 2;
    LIFECYCLE_STATE_PURGED = 3;
}

message TopicState {
    int64 revision = 1;
    map<int32, PartitionState> partition_states = 2;
    LifecycleState lifecycle_state = 3;
    uint64 total_kafka_processed_bytes = 4;
    uint64 last_committed_snapshot_id = 5;
}

message DescribeCatalogRequest {}

// Currently empty. In the future, may include additional catalog
// information such as configuration details or capabilities.
message DescribeCatalogResponse {}
