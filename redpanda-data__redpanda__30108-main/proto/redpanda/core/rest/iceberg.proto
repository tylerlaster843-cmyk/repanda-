syntax = "proto3";

package redpanda.core.rest.v1;

import "proto/redpanda/core/pbgen/options.proto";

option (pbgen.cpp_namespace) = "proto::pandaproxy";

// Indicates whether translation is enabled for a topic.
enum TranslationStatus {
    TRANSLATION_STATUS_UNSPECIFIED = 0;
    TRANSLATION_STATUS_DISABLED = 1;
    TRANSLATION_STATUS_ENABLED = 2;
}

// State of a single partition's Iceberg translation.
message PartitionState {
    // Last translated offset for the partition. If not set, no translation
    // has been done for the partition.
    optional int64 last_catalog_committed_offset = 1;
}

// Iceberg translation state for a topic.
message TopicState {
    // Per-partition translation state, keyed by partition index.
    map<int32, PartitionState> partition_states = 1;
    // Whether translation is enabled for this topic.
    TranslationStatus translation_status = 2;
    // Last committed snapshot ID for the topic. If not set, no snapshot has
    // been committed for the topic.
    optional uint64 last_committed_snapshot_id = 3;
    // Iceberg namespace name
    repeated string namespace_name = 4;
    // Iceberg table name
    string table_name = 5;
    // Iceberg DLQ (dead letter queue) table name
    string dlq_table_name = 6;
}

// Returns the Iceberg translation state for one or more topics.
message GetTranslationStateRequest {
    // Names of topics whose state to return. Must be not empty.
    repeated string topics_filter = 1;
}

// Response containing per-topic Iceberg translation state.
message GetTranslationStateResponse {
    // Map of topic name to its translation state.
    map<string, TopicState> topic_states = 1;
}
