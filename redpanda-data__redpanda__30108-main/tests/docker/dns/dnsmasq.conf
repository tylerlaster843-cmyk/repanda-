#log all dns queries
log-queries
# log-facility=/var/log/dnsmasq.log

#use cloudflare as default nameservers
server=1.1.1.1
server=1.0.0.1

#point *.minio-s3 to its static address
address=/minio-s3/192.168.215.125

# Static address for GCP's metadata server so it can be reached from within
# containers by name too. "gcsfs" Python package does that. Generally this
# is not needed as tests which rely on it usually run on bare metal but it is
# handy during development. From local developer machine you will also need to
# run a port forward to a real GCP VM:
#
#     ssh -L 169.254.169.254:80:169.254.169.254:80 <user>@<gcp-vm>
#
# https://cloud.google.com/compute/docs/metadata/overview
address=/metadata.google.internal/169.254.169.254
