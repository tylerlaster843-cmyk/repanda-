syntax = "proto3";
import "google/protobuf/descriptor.proto";
message Request {
}
message Response {
}
service MyService {
  option (my_service_option_b) = "some other string";
  option (my_service_option_a) = "some string";
  option deprecated = false;
  rpc Rpc_b(stream Request) returns (stream Response);
  rpc Rpc_a(Request) returns (Response) {
    option idempotency_level = IDEMPOTENCY_UNKNOWN;
    option deprecated = true;
    option (my_method_option_b) = "Some other string";
    option (my_method_option_a) = "Some string";
  }
}

extend google.protobuf.ServiceOptions {
  optional string my_service_option_b = 50014;
  optional string my_service_option_a = 50006;
}
extend google.protobuf.MethodOptions {
  optional string my_method_option_b = 50015;
  optional string my_method_option_a = 50007;
}

