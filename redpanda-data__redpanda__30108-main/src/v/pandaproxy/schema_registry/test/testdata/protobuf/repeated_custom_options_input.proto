syntax = "proto3";

import "google/protobuf/descriptor.proto";

message MyMessageA {
  message Inner {
    repeated int32 many_ints = 1;
  }
  repeated Inner inner = 1;
  Inner inner2 = 2;
  int32 myint = 3;
}

message MyMessageB {
    option (my_message_option) = {
        myint: -3
        inner: [
            {
               many_ints: [4,5,6]
            },
            {
                many_ints: 1 many_ints: 2
                many_ints: 3
            }
        ],
        inner2: {
            many_ints: 1 many_ints: 2
            many_ints: 3
        }
    };
}

extend google.protobuf.MessageOptions {
  optional MyMessageA my_message_option = 50009;
}
