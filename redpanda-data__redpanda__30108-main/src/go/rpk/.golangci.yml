version: "2"
run:
  tests: false
  allow-parallel-runners: true
linters:
  # golangci-lint by default ignores some staticcheck and vet raised issues that
  # are actually important to catch. The following ensures that we do not ignore
  # those tools ever.
  default: none
  # We opt out of all suggested linters and manually pick what we want.
  # Please do not use enable-all.
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - contextcheck
    - durationcheck
    - errname
    - errorlint
    - godot
    - goprintffuncname
    - govet
    - ineffassign
    - misspell
    - nilerr
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - unconvert
    - unused
    - usetesting
    - wastedassign
    - whitespace
  settings:
    errorlint:
      # We do not want to enforce every usage of fmt.Errorf to use %w.
      errorf: false
    nolintlint:
      # If we want to opt out of a lint, we require an explanation.
      require-explanation: true
      require-specific: true
      allow-unused: false
    # Revive is yet another metalinter with a lot of useful lints.
    # The below opts in to all the ones we would like to use.
    revive:
      confidence: 0.6
      severity: warning
      rules:
        - name: atomic
        - name: blank-imports
        - name: bool-literal-in-expr
        - name: call-to-gc
        - name: confusing-results
        - name: constant-logical-expr
        - name: context-as-argument
        - name: context-keys-type
        - name: defer
        - name: dot-imports
        - name: duplicated-imports
        - name: early-return
        - name: error-naming
        - name: error-return
        - name: error-strings
          exclude: ["Redpanda"]
          arguments:
            - out.Die
            - out.MaybeDie
            - out.DieString
            - out.MaybeDieString
        - name: get-return
        - name: identical-branches
        - name: if-return
        - name: modifies-value-receiver
        - name: optimize-operands-order
        - name: package-comments
          disabled: true
        - name: range
        - name: range-val-in-closure
        - name: receiver-naming
        - name: string-of-int
        - name: struct-tag
        - name: superfluous-else
        - name: time-equal
        - name: time-naming
        - name: unconditional-recursion
        - name: unnecessary-stmt
        - name: unreachable-code
        - name: unused-parameter
        - name: unused-receiver
        - name: useless-break
        - name: var-declaration
        - name: var-naming
          # This rule accepts two slices of strings and one optional slice containing a single map with named parameters
          # https://revive.run/r#var-naming
          arguments:
            - []
            - []
            - - skip-package-name-checks: true
        - name: waitgroup-by-value
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
